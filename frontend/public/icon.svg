<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160">
  <!-- Rounded square background -->
  <rect width="160" height="160" rx="36" fill="#7C3AED"/>
  <!-- Top node -->
  <circle cx="80" cy="44" r="13" fill="#F7F3EE"/>
  <!-- Stem -->
  <line x1="80" y1="57" x2="80" y2="82" stroke="#F7F3EE" stroke-width="5" stroke-linecap="round"/>
  <!-- Left branch -->
  <line x1="80" y1="82" x2="44" y2="112" stroke="#F7F3EE" stroke-width="5" stroke-linecap="round"/>
  <!-- Right branch -->
  <line x1="80" y1="82" x2="116" y2="112" stroke="#F7F3EE" stroke-width="5" stroke-linecap="round"/>
  <!-- Left endpoint -->
  <circle cx="44" cy="124" r="11" fill="#C4B5FD"/>
  <!-- Right endpoint -->
  <circle cx="116" cy="124" r="11" fill="#C4B5FD"/>
</svg>
